name: Build PRD Image

# Builds the LibreChat image (api + built frontend) for self-hosted deployment
# on laifu, replacing the upstream prebuilt image. Pushes to GHCR.
#
# The frontend is built here in CI, NOT on the deployment host, so the
# resource-constrained shared host never runs `npm run frontend`.
#
# VITE_PRD_AGENT_ID is a build-time variable baked into the frontend bundle
# (see docs/prd/agent/SETUP.md). Set it as a repository variable, or pass it
# when dispatching manually. When empty, the PRD dashboard stays inert.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (in addition to the commit SHA)'
        required: false
        default: 'latest'
      vite_prd_agent_id:
        description: 'PRD agent id to bake into the frontend (overrides the repo variable)'
        required: false
        default: ''
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'client/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 130
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare environment
        run: cp .env.example .env

      - name: Compute build metadata
        run: |
          echo "BUILD_COMMIT=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "BUILD_BRANCH=${{ github.ref_name }}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          # Manual input wins; otherwise fall back to the repo variable; otherwise empty.
          AGENT_ID="${{ github.event.inputs.vite_prd_agent_id }}"
          if [ -z "$AGENT_ID" ]; then
            AGENT_ID="${{ vars.VITE_PRD_AGENT_ID }}"
          fi
          echo "VITE_PRD_AGENT_ID=$AGENT_ID" >> "$GITHUB_ENV"
          EXTRA_TAG="${{ github.event.inputs.tag }}"
          if [ -z "$EXTRA_TAG" ]; then
            EXTRA_TAG="latest"
          fi
          echo "EXTRA_TAG=$EXTRA_TAG" >> "$GITHUB_ENV"

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: node
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/librechat-api:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/librechat-api:${{ env.EXTRA_TAG }}
          build-args: |
            BUILD_COMMIT=${{ env.BUILD_COMMIT }}
            BUILD_BRANCH=${{ env.BUILD_BRANCH }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            VITE_PRD_AGENT_ID=${{ env.VITE_PRD_AGENT_ID }}

      - name: Summary
        run: |
          {
            echo "### Image built"
            echo ""
            echo "- \`ghcr.io/${{ env.OWNER_LC }}/librechat-api:${{ github.sha }}\`"
            echo "- \`ghcr.io/${{ env.OWNER_LC }}/librechat-api:${{ env.EXTRA_TAG }}\`"
            echo "- VITE_PRD_AGENT_ID baked: $([ -n \"${{ env.VITE_PRD_AGENT_ID }}\" ] && echo yes || echo 'no (dashboard inert)')"
          } >> "$GITHUB_STEP_SUMMARY"
